name: Example Vitest CI Workflow with Testream Reporter for Jira
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: vitest-tests
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    env:
      # Add this secret in: Settings -> Secrets and variables -> Actions -> New repository secret.
      TESTREAM_API_KEY: ${{ secrets.TESTREAM_API_KEY }}
      TESTREAM_TEST_ENVIRONMENT: ci
      TESTREAM_APP_VERSION: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest tests
        run: npm test
